version: "3"

tasks:
  dev:
    desc: Tauri アプリを開発モードで起動
    cmds:
      - pnpm tauri dev

  dev:front:
    desc: フロントエンドのみ起動（ブラウザで確認）
    cmds:
      - pnpm dev

  build:
    desc: プロダクションビルド（バイナリ生成）
    cmds:
      - pnpm tauri build

  test:
    desc: 全テスト実行
    cmds:
      - task: test:rust

  test:rust:
    desc: Rust テスト実行
    cmds:
      - cargo test --manifest-path src-tauri/Cargo.toml

  fmt:
    desc: 全フォーマット実行
    cmds:
      - task: fmt:rust

  fmt:check:
    desc: 全フォーマットチェック（修正なし）
    cmds:
      - task: fmt:rust:check

  fmt:rust:
    desc: cargo fmt でフォーマット実行
    cmds:
      - cargo fmt --manifest-path src-tauri/Cargo.toml

  fmt:rust:check:
    desc: cargo fmt でフォーマットチェック（修正なし）
    cmds:
      - cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

  lint:
    desc: ESLint でリントチェック
    cmds:
      - pnpm lint

  clippy:
    desc: Rust の静的解析
    cmds:
      - cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

  check:
    desc: 全チェック実行（lint + clippy + test）
    cmds:
      - task: lint
      - task: clippy
      - task: test

  designs:link:
    desc: デザインモックにページ遷移スクリプトを注入して designs-linked へ出力
    cmds:
      - connect --out-dir ./designs-linked ./designs

  designs:clean:
    desc: designs-linked から注入済みスクリプトを除去
    cmds:
      - connect --clean --out-dir ./designs-linked ./designs
